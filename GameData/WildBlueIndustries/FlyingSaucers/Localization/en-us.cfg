		// Flapjack Parts
		#LOC_KFS_FJ_dockingPort_Title = A-51 Docking Port
		#LOC_KFS_FJ_dockingPort_Desc = This shielded low profile docking port gives the A-51 the ability to dock with other craft. It's compatible with the Clamp-O-Tron port as well.
		#LOC_KFS_FJ_arcWing_Title = A-51 Arc Wing
		#LOC_KFS_FJ_arcWing_Desc = An oddly shaped wing designed for saucer sections.
		#LOC_KFS_FJ_coanda_Title = AVR0 "Coanda" Hover Jet
		#LOC_KFS_FJ_coanda_Desc = This modified jet engine is designed to allow aircraft to hover above the surface. The Coanda is unique in that the exhaust ports encompases the rim of the Flapjack's saucer. Its flight computer automatically accounts for the craft's center of mass.
		#LOC_KFS_FJ_bodyFlap_Title = Small Body Flap
		#LOC_KFS_FJ_bodyFlap_Desc = When lining the back of a flying saucer, the body flap helps stabilize the disc shape and improves control in an atmosphere.
		#LOC_KFS_FJ_cargoBay_Title = A-51 Cargo Bay
		#LOC_KFS_FJ_cargoBay_Desc = Advanced liquid metal memory alloys enable the cargo bay doors to flow like water as they open and close and to be stored in a compact space.
		#LOC_KFS_FJ_cockpit_Title = A-51 "Flapjack" Cockpit
		#LOC_KFS_FJ_cockpit_Desc = This cockpit is a critical component of the A-51 "Flapjack," a prototype alien hybrid rocket saucer. It is designed to test the flight characteristics of a flying saucer using conventional propulsion, though advanced technologies might provide exotic propulsion in the future. The A-51 incorporates alien metals of unknown origin.
		#LOC_KFS_FJ_conferenceRoom_Title = A-51 Conference Room
		#LOC_KFS_FJ_conferenceRoom_Desc = The A-51 Conference Room is the perfect place to plan alien abductions. It seats 5 and has locker space for various tools.
		#LOC_KFS_FJ_crewCabin_Title = A-51 Crew Cabin
		#LOC_KFS_FJ_crewCabin_Desc = The A-51 Crew Cabin is designed to transport abductees- er, astronauts- in relative comfort. It sleeps 2 but can accommodate up to 4 passengers and comes with a lavatory, locker space, and small food prep area.
		#LOC_KFS_FJ_mk2Adapter_Title = A-51-Mk2 Adapter
		#LOC_KFS_FJ_mk2Adapter_Desc = This lightweight adapter connects with Mk2 components. It has plenty of luggage space as well as reaction wheels and a fuel cell to generate power. There's even a small bay to hold a few items.
		#LOC_KFS_FJ_mk2EnginePlate_Title = EP-M2 Engine Plate
		#LOC_KFS_FJ_mk2EnginePlate_Desc = This engine plate is designed to attach one or more engines to components built for the Mk2 form factor.
		#LOC_KFS_FJ_gravGenerator_Title = A-51 Gravimetric Displacement Generator
		#LOC_KFS_FJ_gravGenerator_Desc = The Gravimetric Displacement Generator is designed to zap Graviolium with ElectricCharge to produce GravityWaves which can then be used for various purposes. The process also produces StaticCharge which must be discharged from the vessel. If the craft accumulates too much StaticCharge, then the generator shuts down. The generator also has a backup RTG to serve as an auxilary power source.
		#LOC_KFS_FJ_graviticEngine_Title = A-51 Gravitic Engine
		#LOC_KFS_FJ_graviticEngine_Desc = Using revolutionary technologies reverse-engineered from crashed flying saucers, the Gravitic Engine creates localized distortions in space-time thousands of times per second. The artificial singularity is then projected so that the vessel "falls" in the desired direction of travel. Its maximum acceleration is affected by the mass of the vessel; the higher the mass, the more GravityWaves required to propel the ship.
		#LOC_KFS_FJ_halfKeel_Title = A-51 Half Keel
		#LOC_KFS_FJ_halfKeel_Desc = The Half Keel provides a simple skeletal core from which to attach more important components such as wings, engine mounts, and cockpits.
		#LOC_KFS_FJ_landingLeg_Title = A-51 Landing Strut
		#LOC_KFS_FJ_landingLeg_Desc = The A-51 Landing Strut offers a method for planting yourself firmly on the ground, without the severe consequences that usually accompany planting yourself firmly on the ground.
		#LOC_KFS_FJ_areospike_Title = A-51 Linear Aerospike
		#LOC_KFS_FJ_areospike_Desc = The linear aerospike is a special engine design that has an altitude compensating nozzle. This nozzle maintains fuel consumption efficiency across all altitudes. It's well suited for single-stage-to-orbit craft. This particular design is optimized for the A-51.
		#LOC_KFS_FJ_mk2Decoupler_Title = Mk2 Decoupler
		#LOC_KFS_FJ_mk2Decoupler_Desc = This is a simple decoupler for Mk2 parts. It's particularly suited for the Mk2 shroud.
		#LOC_KFS_FJ_keel_Title = A-51 Structural Keel
		#LOC_KFS_FJ_keel_Desc = The Structural Keel provides a simple skeletal core from which to attach more important components such as wings, engine mounts, and cockpits.
		#LOC_KFS_FJ_tailFin_Title = Small Tail Fin
		#LOC_KFS_FJ_tailFin_Desc = Wild Blue Industries was asked to adapt their Buffalo Canard for a top secret aircraft and delivered this tail fin with no questions asked. Well, ok, they asked a few, but they were repeatedly told that it was classified.
		#LOC_KFS_FJ_ixsCockpit_Title = IXS Cockpit
		#LOC_KFS_FJ_ixsCockpit_Desc = A cockpit for explorers going on some kind of interstellar trek. It is not shaped like a carp with a chew toy. It can host up to 3 A-51 saucer sections.
		#LOC_KFS_FJ_wingTank_Title = A-51 Wing Tank
		#LOC_KFS_FJ_wingTank_Desc = This lightweight wing tank combines the a saucer section that generates lift along with storage capacity. Advanced technologies produce laminar flow and thus greatly reduce drag.

		// RCS Parts
		#LOC_KFS_rcsLinearTitle = Linear Plasma RCS Port
		#LOC_KFS_rcsLinearDesc = By generating electro-plasma in a fusion reactor and ducting it through an electro-plasma system (EPS) conduit, this RCS thruster can efficiently reposition and reorient a vessel.
		#LOC_KFS_rcs5WayTitle = 5-Way Plasma RCS Port
		#LOC_KFS_rcs5WayDesc = By generating electro-plasma in a fusion reactor and ducting it through an electro-plasma system (EPS) conduit, this RCS thruster can efficiently reposition and reorient a vessel in 5 different directions for improved pilot confusion.

		// Gravitic Fusion Reactor
		#LOC_KFS_fusionReactorTitle = Gravitic Fusion Reactor
		#LOC_KFS_fusionReactorDesc = This fusion reactor uses gravitic displacement fields (a.k.a. Gravity Waves) to crush Fusion Pellets until they fuse. The resulting Electro Plasma is then tapped to produce Electric Charge. The plasma has other uses such as supplying propellant for electro-plasma RCS thrusters.
		#LOC_KFS_BlueshiftDesc = This fusion reactor uses gravitic displacement fields (a.k.a. Gravity Waves) to crush Fusion Pellets until they fuse. The resulting Electro Plasma is then tapped to produce Electric Charge. The plasma has other uses such as supplying propellant for electro-plasma RCS thrusters.
		#LOC_KFS_FFTDesc = This fusion reactor uses gravitic displacement fields (a.k.a. Gravity Waves) to crush Liquid Deuterium until it fuses. The resulting Electro Plasma is then tapped to produce Electric Charge. The plasma has other uses such as supplying propellant for electro-plasma RCS thrusters.

		// Hover Jet
		#LOC_KFS_hoverJetTitle = AVR1 "Nexus" Hover Jet
		#LOC_KFS_hoverJetDesc = This modified jet engine is designed to allow aircraft to hover above the surface.

		// Omni Tanks
		#LOC_KFS_mk2TankTitle = Mk2 Omni Tank
		#LOC_KFS_mk3S3TankTitle = Mk3-S3 Omni Tank
		#LOC_KFS_s1EndcapTankTitle = S-1 Omni Endcap Tank
		#LOC_KFS_s1TankTitle = S-1 Omni Tank
		#LOC_KFS_s2EndcapTankTitle = S-2 Omni Endcap Tank
		#LOC_KFS_s2TankTitle = S-2 Omni Tank
		#LOC_KFS_s3TankTitle = S-3 Omni Tank
		#LOC_KFS_omniTankDesc = This tank holds Propellium and Graviolium to power gravitic engines with.

		// K2 Kray Kray
		#LOC_KFS_krayKrayTitle = K2 "Kray Kray" Supercomputer
		#LOC_KFS_krayKrayDesc = The K2 has an insane amount of computing power with which to conduct breakthrough technology research. Even when the science gained in an area has dried up, there's still a chance that the K2's research can unlock technologies that are normally accessible only after certain preconditions are met.

		// LDEF
		#LOC_KFS_ldefTitle = Graviolium Preliminary Study
		#LOC_KFS_ldefDesc = Be sure to check "More Info" to understand the experiment's requirements. Graviolium is a rare substance that defies normal chemical analysis. We practically have to invent new instruments to study it.

		// UFO
		#LOC_KFS_ufoTitle = Unidentified Flying Saucer
		#LOC_KFS_ufoDesc = A mysterious craft sailing through the void. What happened to the crew?

		// Hydroscoop
		#LOC_KFS_hydroScoopTitle = Hydroscoop
		#LOC_KFS_hydroScoopDesc = A combined liquid intake pump and electrolysis device, the Hydroscoop can extract Propellium and other useful resources from an ocean or other body of liquid.

		// Hair Piece
		#LOC_KFS_hairTitle = Giorgio Kerman Hair Crown
		#LOC_KFS_hairDesc = When asked what inspired him to create this fashionable hair crown, Giorgio Kerman said, "I'm not saying it was aliens, but it was aliens."

		// Plasma Contactor
		#LOC_KFS_plasmaContactorTitle = Plasma Contactor
		#LOC_KFS_plasmaContactorLargeTitle = Plasma Contactor (Large)
		#LOC_KFS_plasmaContactorModuleTitle = Plasma Contactor Module
		#LOC_KFS_plasmaContactorDesc = Gravimetric displacement generators produce StaticCharge when generating GravityWaves. If the vessel accumulates too much StaticCharge, then the generators will shut down. A plasma contactor eliminates the charge by venting ionized xenon gas in vacuum conditions, but if the craft is landed, splashed, or flying in an atmosphere then it can eliminate StaticCharge as well.

		// Stardust
		#LOC_KFS_stardustTitle = Stardust Graviolium Collector
		#LOC_KFS_stardustDesc = While mining asteroids and prospecting yield the best veins of Graviolium, dust-form Graviolium does exist in the magnetospheres of certain worlds. The Stardust Graviolium Collector can slowly accumulate Graviolium over time given sufficient orbital altitude and ElectricCharge.

		// size1GraviticEngine
		#LOC_KFS_size1GraviticEngineTitle = GND-00 "Baryon" Gravitic Engine
		#LOC_KFS_size1GraviticEngineDesc = Like the prior generation of gravitic engines, the GND-00 "Baryon" focuses gravity waves into an artificial singularity that enables a vessel to "fall" in the desired direction of travel. But unlike the previous generation, the GND-00 is an advanced, compact design that contains a fusion reactor and a gravimetric displacement generator in addition to the singularity projector. The end result is a self-contained system that allows vessels to fly via gravity.

		// size2GraviticEngine
		#LOC_KFS_size2GraviticEngineTitle = GND-01 "Quantum" Gravitic Engine
		#LOC_KFS_size2GraviticEngineDesc = Like the prior generation of gravitic engines, the GND-01 "Quantum" focuses gravity waves into an artificial singularity that enables a vessel to "fall" in the desired direction of travel. But unlike the previous generation, the GND-01 is an advanced, compact design that contains a fusion reactor and a gravimetric displacement generator in addition to the singularity projector. The end result is a self-contained system that allows vessels to fly via gravity.

		// Part variants
		#LOC_KFS_ShinyPanels = Shiny panels
		#LOC_KFS_MattePanels = Matte panels
